<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ReadyDocs</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="theme-color" content="#15213B" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: #0C0F16;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  button { font-family: inherit; }
  #app {
    min-height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  @keyframes slideUp {
    from { transform: translateY(120%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
  var PALETTE = {
    navy: '#15213B', paper: '#F2ECDF', card: '#FBF8F1', ink: '#1E2433',
    inkMuted: '#7A7261', amber: '#C2791E', amberSoft: '#EFD9B8',
    sage: '#3F7A53', sageSoft: '#E7EFE6', hairline: '#E2D8C0'
  };

  var CHECK_DATE = { en: '18 Jun 2026', hi: '18 जून 2026' };

  var STRINGS = {
    en: {
      tasks: 'Tasks', catTitle: 'Your tasks', catTagline: 'Pick what you need to do',
      docsCount: function (n) { return n + ' documents needed'; }, comingSoon: 'Soon',
      title: 'Open a bank account', subtitle: 'Savings account · any major Indian bank',
      stepsHeading: 'How it works', docsHeading: 'Documents needed',
      readyTitle: "You're ready!", readySubtitle: 'All documents collected for this task.', shareLabel: 'Share',
      ready: function (d, t) { return d + ' of ' + t + ' ready'; },
      sample: 'Sample', verified: function (d) { return 'Verified · Last checked ' + d; },
      reportIssue: 'Report issue', costLabel: 'Official cost', costFree: 'Free',
      costNote: "Banks can't charge you to open this — it's an RBI-mandated free account.",
      footer: 'Sample documents are illustrative, not real scans.',
      markCollected: 'Mark as collected', markNotCollected: 'Mark as not collected', showExample: 'Show example'
    },
    hi: {
      tasks: 'टास्क', catTitle: 'आपके टास्क', catTagline: 'जो काम करना है, चुनें',
      docsCount: function (n) { return n + ' दस्तावेज़ चाहिए'; }, comingSoon: 'जल्द ही',
      title: 'बैंक खाता खोलें', subtitle: 'बचत खाता · कोई भी प्रमुख भारतीय बैंक',
      stepsHeading: 'यह कैसे होता है', docsHeading: 'ज़रूरी दस्तावेज़',
      readyTitle: 'आप तैयार हैं!', readySubtitle: 'इस टास्क के लिए सभी दस्तावेज़ तैयार हैं।', shareLabel: 'शेयर करें',
      ready: function (d, t) { return t + ' में से ' + d + ' तैयार'; },
      sample: 'नमूना', verified: function (d) { return 'सत्यापित · आख़िरी बार ' + d + ' को जांचा गया'; },
      reportIssue: 'समस्या बताएं', costLabel: 'आधिकारिक शुल्क', costFree: 'मुफ़्त',
      costNote: 'बैंक इसे खोलने के लिए पैसे नहीं ले सकते — यह RBI द्वारा तय किया गया मुफ़्त खाता है।',
      footer: 'नमूना दस्तावेज़ सिर्फ़ उदाहरण हैं, असली स्कैन नहीं।',
      markCollected: 'एकत्रित के रूप में चिह्नित करें', markNotCollected: 'असंग्रहित के रूप में चिह्नित करें', showExample: 'उदाहरण देखें'
    }
  };

  var DOCS = [
    { id: 'aadhaar', type: 'aadhaar',
      name: { en: 'Aadhaar card', hi: 'आधार कार्ड' },
      subtitle: { en: 'Identity & address proof', hi: 'पहचान और पता प्रमाण' },
      note: { en: 'Name and address must match exactly what you give the bank.', hi: 'नाम और पता बैंक को दी गई जानकारी से पूरी तरह मेल खाना चाहिए।' },
      annotations: {
        en: ['Full name spelled exactly as elsewhere', 'Current address — not an old one', 'Photo and 12-digit number clearly visible'],
        hi: ['पूरा नाम बाकी दस्तावेज़ों जैसा ही लिखा हो', 'मौजूदा पता — पुराना नहीं', 'फोटो और 12 अंकों की संख्या साफ़ दिखनी चाहिए']
      } },
    { id: 'pan', type: 'pan',
      name: { en: 'PAN card', hi: 'पैन कार्ड' },
      subtitle: { en: 'Mandatory for KYC', hi: 'KYC के लिए अनिवार्य' },
      note: { en: 'Required for any account, even a zero-balance one.', hi: 'हर खाते के लिए ज़रूरी है, भले ही वह ज़ीरो-बैलेंस खाता हो।' },
      annotations: {
        en: ['10-character PAN visible, not worn off', 'Name matches your Aadhaar exactly', 'Card not laminated over a tear or crack'],
        hi: ['10 अक्षरों का पैन नंबर साफ़ दिखे, मिटा हुआ न हो', 'नाम आधार से पूरी तरह मेल खाना चाहिए', 'कार्ड फटा या टूटा होकर लैमिनेट न किया गया हो']
      } },
    { id: 'photo', type: 'photo',
      name: { en: 'Passport-size photo', hi: 'पासपोर्ट साइज़ फोटो' },
      subtitle: { en: '2 recent copies', hi: '2 हाल की कॉपियां' },
      note: { en: 'Taken in the last 6 months — no filters or old photos.', hi: 'पिछले 6 महीनों में खींची गई हो — कोई फ़िल्टर या पुरानी फोटो नहीं।' },
      annotations: {
        en: ['Plain white or light background', '35×45mm, face centred', 'No sunglasses, cap, or heavy shadow'],
        hi: ['सादा सफ़ेद या हल्का बैकग्राउंड', '35×45mm, चेहरा बीच में हो', 'धूप का चश्मा, कैप या गहरी छाया नहीं']
      } },
    { id: 'address', type: 'letter',
      name: { en: 'Address proof', hi: 'पता प्रमाण' },
      subtitle: { en: 'Only if different from Aadhaar', hi: 'केवल अगर आधार से अलग हो' },
      note: { en: 'Utility bill, rent agreement, or bank letter — dated within 3 months.', hi: 'बिजली-पानी का बिल, रेंट एग्रीमेंट, या बैंक लेटर — 3 महीने के भीतर की तारीख़ का।' },
      annotations: {
        en: ['Your name and current address visible', 'Dated within the last 3 months', 'Issuer name visible at the top'],
        hi: ['आपका नाम और मौजूदा पता दिखे', 'पिछले 3 महीनों की तारीख़ का', 'ऊपर जारीकर्ता का नाम दिखे']
      } },
    { id: 'signature', type: 'signature',
      name: { en: 'Specimen signature', hi: 'नमूना हस्ताक्षर' },
      subtitle: { en: 'Signed in front of the bank official', hi: 'बैंक अधिकारी के सामने हस्ताक्षरित' },
      note: { en: 'Use the same signature you\u2019ll use on cheques later.', hi: 'वही हस्ताक्षर करें जो आप आगे चेक पर करेंगे।' },
      annotations: {
        en: ['Signed inside the box, not across it', 'Same style every time you sign'],
        hi: ['बॉक्स के भीतर हस्ताक्षर करें, उसके आड़े नहीं', 'हर बार एक जैसी शैली में हस्ताक्षर करें']
      } }
  ];

  var STEPS = [
    { title: { en: 'Choose your bank & account type', hi: 'बैंक और खाते का प्रकार चुनें' },
      desc: { en: 'Most banks let you start this online or by visiting a branch.', hi: 'ज़्यादातर बैंकों में यह ऑनलाइन या ब्रांच जाकर शुरू किया जा सकता है।' },
      where: { en: 'Online or branch', hi: 'ऑनलाइन या ब्रांच' }, duration: { en: '5–10 min', hi: '5–10 मिनट' } },
    { title: { en: 'Fill the account opening form', hi: 'खाता खोलने का फॉर्म भरें' },
      desc: { en: 'Online form or paper form at the branch — same information either way.', hi: 'ऑनलाइन फॉर्म हो या ब्रांच का पेपर फॉर्म — जानकारी वही रहती है।' },
      where: { en: 'Online or branch', hi: 'ऑनलाइन या ब्रांच' }, duration: { en: '10 min', hi: '10 मिनट' } },
    { title: { en: 'Submit your documents', hi: 'अपने दस्तावेज़ जमा करें' },
      desc: { en: 'Hand over or upload the documents from the checklist below.', hi: 'नीचे दी गई चेकलिस्ट के दस्तावेज़ जमा करें या अपलोड करें।' },
      where: { en: 'Online or branch', hi: 'ऑनलाइन या ब्रांच' }, duration: { en: 'Same visit', hi: 'उसी विज़िट में' } },
    { title: { en: 'Complete KYC verification', hi: 'KYC सत्यापन पूरा करें' },
      desc: { en: 'In person at the branch, or by video call if you applied online.', hi: 'ब्रांच में सामने से, या ऑनलाइन अप्लाई किया हो तो वीडियो कॉल से।' },
      where: { en: 'Branch or video call', hi: 'ब्रांच या वीडियो कॉल' }, duration: { en: '10–15 min', hi: '10–15 मिनट' } },
    { title: { en: 'Get your account details', hi: 'खाते की जानकारी पाएं' },
      desc: { en: 'Account number by SMS/email; debit card and passbook follow by post.', hi: 'खाता नंबर SMS/ईमेल से मिलेगा; डेबिट कार्ड और पासबुक डाक से आएंगे।' },
      where: { en: 'Sent to you', hi: 'आपके पास भेजा जाएगा' }, duration: { en: '3–7 working days', hi: '3–7 कार्य दिवस' } }
  ];

  var TASKS = [
    { id: 'aadhaar', icon: '🪪', name: { en: 'Aadhaar (new / update)', hi: 'आधार (नया / अपडेट)' }, docs: 4, available: false },
    { id: 'pan', icon: '💳', name: { en: 'PAN card', hi: 'पैन कार्ड' }, docs: 3, available: false },
    { id: 'voter', icon: '🗳️', name: { en: 'Voter ID (EPIC)', hi: 'वोटर आईडी' }, docs: 3, available: false },
    { id: 'bank', icon: '🏦', name: { en: 'Open a bank account', hi: 'बैंक खाता खोलें' }, docs: DOCS.length, available: true },
    { id: 'license', icon: '🚗', name: { en: 'Driving license', hi: 'ड्राइविंग लाइसेंस' }, docs: 5, available: false },
    { id: 'ration', icon: '🧺', name: { en: 'Ration card', hi: 'राशन कार्ड' }, docs: 4, available: false },
    { id: 'gas', icon: '🔥', name: { en: 'LPG gas connection', hi: 'एलपीजी गैस कनेक्शन' }, docs: 3, available: false },
    { id: 'address', icon: '🏠', name: { en: 'Address change', hi: 'पता बदलें' }, docs: 3, available: false }
  ];

  var state = { lang: 'en', page: 'catalog', checked: {}, expandedId: DOCS[0].id };

  function isDone() {
    return DOCS.every(function (d) { return !!state.checked[d.id]; });
  }

  // ---- inline icon SVGs (self-contained, no external icon font needed) ----
  function svgIcon(paths, color, size) {
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color +
      '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>';
  }
  function checkSvg(c) { return svgIcon('<polyline points="20 6 9 17 4 12"></polyline>', c, 15); }
  function chevronDownSvg(c) { return svgIcon('<polyline points="6 9 12 15 18 9"></polyline>', c, 16); }
  function chevronUpSvg(c) { return svgIcon('<polyline points="18 15 12 9 6 15"></polyline>', c, 16); }
  function chevronLeftSvg(c) { return svgIcon('<polyline points="15 18 9 12 15 6"></polyline>', c, 16); }
  function chevronRightSvg(c) { return svgIcon('<polyline points="9 18 15 12 9 6"></polyline>', c, 16); }
  function shieldCheckSvg(c) { return svgIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 12 15 16 10"></polyline>', c, 16); }
  function flagSvg(c) { return svgIcon('<path d="M4 22V4a1 1 0 0 1 1-1h12l-2 5 2 5H6"></path>', c, 11); }
  function banknoteSvg(c) { return svgIcon('<rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path>', c, 16); }
  function sparklesSvg(c) { return svgIcon('<path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"></path>', c, 16); }
  function share2Svg(c) { return svgIcon('<circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"></line><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"></line>', c, 12); }

  // ---- document thumbnail mocks ----
  function thumbFrame(type, small, inner) {
    var aspects = { aadhaar: '8 / 5', pan: '8 / 5', photo: '1 / 1', letter: '3 / 4', signature: '2 / 1' };
    var sizeStyle = small ? 'width:56px;height:56px;' : 'width:100%;aspect-ratio:' + aspects[type] + ';';
    return '<div style="border:1px solid ' + PALETTE.hairline + ';background:#fff;border-radius:8px;overflow:hidden;position:relative;flex-shrink:0;' + sizeStyle + '">' + inner + '</div>';
  }
  function thumbAadhaar(small) {
    var photoBox = '<div style="flex-shrink:0;border-radius:2px;background:#D9D3C3;width:' + (small ? '12px' : '20%') + ';height:' + (small ? '12px' : '60%') + ';"></div>';
    var qr = !small ? '<div style="flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:1px;width:16px;height:16px;">' +
      Array.from({ length: 9 }).map(function (_, i) { return '<div style="background:' + (i % 2 === 0 ? PALETTE.navy : 'transparent') + '"></div>'; }).join('') + '</div>' : '';
    var inner = '<div style="height:100%;width:100%;display:flex;flex-direction:column;">' +
      '<div style="height:24%;background:' + PALETTE.navy + ';"></div>' +
      '<div style="flex:1;display:flex;align-items:center;gap:4px;padding:0 6px;">' + photoBox +
      '<div style="flex:1;display:flex;flex-direction:column;gap:4px;">' +
      '<div style="height:3px;border-radius:2px;width:80%;background:#C7C0AC;"></div>' +
      '<div style="height:3px;border-radius:2px;width:55%;background:#C7C0AC;"></div>' +
      (!small ? '<div style="height:3px;border-radius:2px;width:65%;background:' + PALETTE.amber + ';"></div>' : '') +
      '</div>' + qr + '</div></div>';
    return thumbFrame('aadhaar', small, inner);
  }
  function thumbPan(small) {
    var photoBox = '<div style="flex-shrink:0;border-radius:2px;background:#D9D3C3;width:' + (small ? '12px' : '20%') + ';height:' + (small ? '12px' : '60%') + ';"></div>';
    var panCode = !small ? '<span style="font-family:monospace;font-size:7px;color:' + PALETTE.ink + ';letter-spacing:1px;">ABCDE1234F</span>' : '';
    var inner = '<div style="height:100%;width:100%;display:flex;flex-direction:column;">' +
      '<div style="height:14%;background:' + PALETTE.amber + ';"></div>' +
      '<div style="flex:1;display:flex;align-items:center;gap:4px;padding:0 6px;">' + photoBox +
      '<div style="flex:1;display:flex;flex-direction:column;gap:4px;">' + panCode +
      '<div style="height:3px;border-radius:2px;width:75%;background:#C7C0AC;"></div>' +
      '<div style="height:3px;border-radius:2px;width:45%;background:#C7C0AC;"></div>' +
      '</div></div></div>';
    return thumbFrame('pan', small, inner);
  }
  function thumbPhoto(small) {
    var label = !small ? '<span style="position:absolute;bottom:2px;right:4px;font-family:monospace;font-size:6px;color:' + PALETTE.inkMuted + ';">35×45mm</span>' : '';
    var inner = '<div style="position:relative;height:100%;width:100%;background:#F1EFE9;">' +
      '<div style="position:absolute;left:21%;right:21%;bottom:0;height:38%;background:#CAC3AF;border-radius:999px 999px 0 0;"></div>' +
      '<div style="position:absolute;left:32%;right:32%;top:16%;height:32%;background:#CAC3AF;border-radius:50%;"></div>' + label + '</div>';
    return thumbFrame('photo', small, inner);
  }
  function thumbLetter(small) {
    var dateLabel = !small ? '<span style="font-family:monospace;font-size:6px;color:' + PALETTE.inkMuted + ';">12 May</span>' : '';
    var inner = '<div style="height:100%;width:100%;display:flex;flex-direction:column;padding:6px;gap:4px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="width:30%;height:' + (small ? '4px' : '7px') + ';background:' + PALETTE.navy + ';border-radius:2px;"></div>' + dateLabel + '</div>' +
      '<div style="height:3px;border-radius:2px;width:90%;background:#D2CCB9;"></div>' +
      '<div style="height:3px;border-radius:2px;width:75%;background:#D2CCB9;"></div>' +
      '<div style="display:inline-block;padding:0 2px;border-radius:2px;background:' + (!small ? PALETTE.amberSoft : 'transparent') + ';width:fit-content;">' +
      '<div style="height:3px;border-radius:2px;width:' + (small ? '50px' : '70px') + ';background:' + (!small ? PALETTE.amber : '#D2CCB9') + ';"></div></div>' +
      '<div style="height:3px;border-radius:2px;width:60%;background:#D2CCB9;"></div>' +
      '<div style="height:3px;border-radius:2px;width:70%;background:#D2CCB9;"></div></div>';
    return thumbFrame('letter', small, inner);
  }
  function thumbSignature(small) {
    var inner = '<div style="position:relative;height:100%;width:100%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;">' +
      '<svg viewBox="0 0 100 30" style="width:75%;height:' + (small ? '50%' : '40%') + ';">' +
      '<path d="M5,25 C15,5 20,28 30,15 S45,5 50,20 S65,8 75,18 S90,10 95,22" fill="none" stroke="' + PALETTE.ink + '" stroke-width="2.5" stroke-linecap="round"></path></svg>' +
      '<div style="position:absolute;bottom:4px;left:10%;right:10%;border-bottom:1px solid ' + PALETTE.hairline + ';"></div></div>';
    return thumbFrame('signature', small, inner);
  }
  function renderThumb(type, small) {
    if (type === 'aadhaar') return thumbAadhaar(small);
    if (type === 'pan') return thumbPan(small);
    if (type === 'photo') return thumbPhoto(small);
    if (type === 'letter') return thumbLetter(small);
    if (type === 'signature') return thumbSignature(small);
    return '';
  }

  function renderLangToggle() {
    function btn(code, label) {
      var active = state.lang === code;
      return '<button data-action="set-lang" data-lang="' + code + '" style="border:none;font-family:monospace;text-transform:uppercase;font-size:11px;letter-spacing:1px;padding:4px 10px;cursor:pointer;' +
        (active ? 'background:' + PALETTE.amber + ';color:#fff;' : 'background:transparent;color:rgba(255,255,255,0.55);') + '">' + label + '</button>';
    }
    return '<div style="display:flex;border:1px solid rgba(255,255,255,0.25);border-radius:999px;overflow:hidden;">' + btn('en', 'EN') + btn('hi', 'हिं') + '</div>';
  }

  function renderCatalogHeader(T) {
    return '<div style="background:' + PALETTE.navy + ';padding:24px 20px 20px;color:#fff;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
      '<span style="font-size:14px;font-weight:600;letter-spacing:0.3px;">ReadyDocs</span>' + renderLangToggle() + '</div>' +
      '<h1 style="font-size:24px;font-weight:700;margin:0;letter-spacing:-0.3px;">' + T.catTitle + '</h1>' +
      '<p style="font-size:14px;color:rgba(255,255,255,0.6);margin:4px 0 0;">' + T.catTagline + '</p></div>';
  }

  function renderCatalogBody(T) {
    var cards = TASKS.map(function (task) {
      var right = task.available
        ? chevronRightSvg(PALETTE.inkMuted)
        : '<span style="flex-shrink:0;font-family:monospace;text-transform:uppercase;font-size:9px;letter-spacing:0.5px;color:' + PALETTE.inkMuted + ';border:1px solid ' + PALETTE.hairline + ';border-radius:4px;padding:2px 6px;">' + T.comingSoon + '</span>';
      return '<button data-action="open-task" data-available="' + task.available + '" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;text-align:left;background:' + PALETTE.card + ';border:1px solid ' + PALETTE.hairline + ';cursor:' + (task.available ? 'pointer' : 'default') + ';' + (task.available ? '' : 'opacity:0.55;') + '">' +
        '<div style="flex-shrink:0;width:40px;height:40px;border-radius:12px;background:' + PALETTE.paper + ';display:flex;align-items:center;justify-content:center;font-size:18px;">' + task.icon + '</div>' +
        '<div style="flex:1;min-width:0;"><h3 style="font-size:14px;font-weight:600;color:' + PALETTE.ink + ';margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + task.name[state.lang] + '</h3>' +
        '<p style="font-size:12px;color:' + PALETTE.inkMuted + ';margin:2px 0 0;">' + T.docsCount(task.docs) + '</p></div>' + right + '</button>';
    }).join('');
    return '<div style="padding:12px;display:flex;flex-direction:column;gap:8px;">' + cards + '</div>';
  }

  function renderChecklistHeader(T) {
    var total = DOCS.length;
    var done = DOCS.filter(function (d) { return state.checked[d.id]; }).length;
    var pct = Math.round((done / total) * 100);
    return '<div style="background:' + PALETTE.navy + ';padding:24px 20px 20px;color:#fff;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
      '<button data-action="go-back" style="display:flex;align-items:center;gap:4px;background:none;border:none;color:rgba(255,255,255,0.6);font-size:14px;cursor:pointer;padding:0;">' +
      chevronLeftSvg('rgba(255,255,255,0.6)') + '<span>' + T.tasks + '</span></button>' + renderLangToggle() + '</div>' +
      '<h1 style="font-size:24px;font-weight:700;margin:0;letter-spacing:-0.3px;">' + T.title + '</h1>' +
      '<p style="font-size:14px;color:rgba(255,255,255,0.6);margin:4px 0 0;">' + T.subtitle + '</p>' +
      '<div style="margin-top:20px;"><div style="display:flex;align-items:center;justify-content:space-between;font-family:monospace;text-transform:uppercase;font-size:11px;letter-spacing:1px;color:' + PALETTE.amberSoft + ';margin-bottom:6px;">' +
      '<span>' + T.ready(done, total) + '</span><span>' + pct + '%</span></div>' +
      '<div style="height:6px;width:100%;border-radius:999px;overflow:hidden;background:rgba(255,255,255,0.12);">' +
      '<div style="height:100%;border-radius:999px;width:' + pct + '%;background:' + PALETTE.amber + ';transition:width 0.4s ease;"></div></div></div></div>';
  }

  function renderTrustStrip(T) {
    return '<div style="padding:12px 12px 0;"><div style="border:1px solid ' + PALETTE.hairline + ';border-radius:16px;overflow:hidden;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;background:' + PALETTE.sageSoft + ';">' +
      '<div style="display:flex;align-items:center;gap:8px;min-width:0;">' + shieldCheckSvg(PALETTE.sage) +
      '<span style="font-size:12px;color:' + PALETTE.ink + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + T.verified(CHECK_DATE[state.lang]) + '</span></div>' +
      '<div style="flex-shrink:0;display:flex;align-items:center;gap:4px;color:' + PALETTE.inkMuted + ';">' + flagSvg(PALETTE.inkMuted) + '<span style="font-size:11px;">' + T.reportIssue + '</span></div></div>' +
      '<div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:' + PALETTE.card + ';border-top:1px solid ' + PALETTE.hairline + ';">' + banknoteSvg(PALETTE.amber) +
      '<div style="min-width:0;"><span style="font-size:12px;font-weight:600;color:' + PALETTE.ink + ';">' + T.costLabel + ': ' + T.costFree + '</span>' +
      '<p style="font-size:12px;color:' + PALETTE.inkMuted + ';margin:2px 0 0;">' + T.costNote + '</p></div></div></div></div>';
  }

  function renderStepsSection(T) {
    var rows = STEPS.map(function (step, i) {
      var isLast = i === STEPS.length - 1;
      return '<div style="display:flex;gap:12px;"><div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">' +
        '<div style="width:28px;height:28px;border-radius:50%;background:' + PALETTE.navy + ';color:#fff;display:flex;align-items:center;justify-content:center;font-family:monospace;font-weight:600;font-size:12px;">' + (i + 1) + '</div>' +
        (!isLast ? '<div style="flex:1;width:1px;min-height:24px;background:' + PALETTE.hairline + ';margin-top:4px;"></div>' : '') + '</div>' +
        '<div style="flex:1;min-width:0;padding-bottom:' + (isLast ? '0' : '16px') + ';">' +
        '<h4 style="font-size:14px;font-weight:600;color:' + PALETTE.ink + ';margin:0;">' + step.title[state.lang] + '</h4>' +
        '<p style="font-size:12px;color:' + PALETTE.inkMuted + ';margin:2px 0 0;">' + step.desc[state.lang] + '</p>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-top:6px;">' +
        '<span style="font-family:monospace;text-transform:uppercase;font-size:9px;letter-spacing:0.5px;color:' + PALETTE.amber + ';border:1px solid ' + PALETTE.amber + ';border-radius:4px;padding:2px 6px;">' + step.where[state.lang] + '</span>' +
        '<span style="font-size:12px;color:' + PALETTE.inkMuted + ';">' + step.duration[state.lang] + '</span></div></div></div>';
    }).join('');
    return '<div style="padding:16px 12px 0;"><h2 style="font-family:monospace;text-transform:uppercase;font-size:11px;letter-spacing:1px;color:' + PALETTE.inkMuted + ';margin:0 0 8px;padding:0 4px;">' + T.stepsHeading + '</h2>' +
      '<div style="background:' + PALETTE.card + ';border:1px solid ' + PALETTE.hairline + ';border-radius:16px;padding:12px;">' + rows + '</div></div>';
  }

  function renderDocRow(doc, T) {
    var checked = !!state.checked[doc.id];
    var expanded = state.expandedId === doc.id;
    var borderColor = checked ? PALETTE.sage : PALETTE.hairline;
    var checkBtnStyle = checked
      ? 'background:' + PALETTE.sage + ';color:#fff;border:1.5px solid ' + PALETTE.sage + ';'
      : 'background:transparent;color:' + PALETTE.inkMuted + ';border:1.5px solid ' + PALETTE.hairline + ';';
    var checkIcon = checked ? checkSvg('#fff') : checkSvg(PALETTE.inkMuted);
    var chevronIcon = expanded ? chevronUpSvg(PALETTE.inkMuted) : chevronDownSvg(PALETTE.inkMuted);

    var expandedPanel = expanded ? (
      '<div style="padding:0 12px 12px;"><div style="background:' + PALETTE.paper + ';border-radius:12px;padding:12px;margin-bottom:12px;">' +
      '<span style="display:inline-block;font-family:monospace;text-transform:uppercase;font-size:10px;letter-spacing:1px;color:' + PALETTE.amber + ';border:1px solid ' + PALETTE.amber + ';border-radius:4px;padding:2px 6px;margin-bottom:8px;">' + T.sample + '</span>' +
      renderThumb(doc.type, false) + '</div>' +
      '<p style="font-size:12px;color:' + PALETTE.ink + ';margin:0 0 8px;">' + doc.note[state.lang] + '</p>' +
      '<ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px;">' +
      doc.annotations[state.lang].map(function (a) {
        return '<li style="font-size:12px;color:' + PALETTE.inkMuted + ';display:flex;gap:6px;"><span style="color:' + PALETTE.amber + ';">\u203a</span>' + a + '</li>';
      }).join('') + '</ul></div>'
    ) : '';

    return '<div style="background:' + PALETTE.card + ';border:1px solid ' + borderColor + ';border-radius:16px;overflow:hidden;">' +
      '<div style="display:flex;align-items:center;gap:12px;padding:12px;">' +
      '<button data-action="toggle-expand" data-id="' + doc.id + '" style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;background:none;border:none;text-align:left;padding:0;cursor:pointer;">' +
      renderThumb(doc.type, true) +
      '<span style="flex:1;min-width:0;"><h3 style="font-size:14px;font-weight:600;color:' + PALETTE.ink + ';margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + doc.name[state.lang] + '</h3>' +
      '<p style="font-size:12px;color:' + PALETTE.inkMuted + ';margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + doc.subtitle[state.lang] + '</p></span></button>' +
      '<button data-action="toggle-doc" data-id="' + doc.id + '" style="flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;' + checkBtnStyle + '">' + checkIcon + '</button>' +
      '<button data-action="toggle-expand" data-id="' + doc.id + '" style="flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;">' + chevronIcon + '</button></div>' + expandedPanel + '</div>';
  }

  function renderDocsSection(T) {
    return '<div style="padding:16px 12px 4px;"><h2 style="font-family:monospace;text-transform:uppercase;font-size:11px;letter-spacing:1px;color:' + PALETTE.inkMuted + ';margin:0;padding:0 4px;">' + T.docsHeading + '</h2></div>' +
      '<div style="padding:0 12px 12px;display:flex;flex-direction:column;gap:10px;">' + DOCS.map(function (d) { return renderDocRow(d, T); }).join('') + '</div>';
  }

  function renderFooter(T) {
    return '<div style="padding:16px 20px;border-top:1px solid ' + PALETTE.hairline + ';"><p style="font-size:11px;line-height:1.6;color:' + PALETTE.inkMuted + ';margin:0;">' + T.footer + '</p></div>';
  }

  function renderToast(T) {
    return '<div style="position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;padding:0 16px 16px;z-index:50;animation:slideUp 0.35s ease-out;">' +
      '<div style="width:100%;max-width:400px;border-radius:16px;padding:12px;display:flex;align-items:center;gap:12px;background:' + PALETTE.sage + ';box-shadow:0 20px 40px rgba(0,0,0,0.3);">' +
      '<div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;">' + sparklesSvg('#fff') + '</div>' +
      '<div style="flex:1;min-width:0;"><h3 style="font-size:14px;font-weight:600;color:#fff;margin:0;">' + T.readyTitle + '</h3>' +
      '<p style="font-size:12px;color:rgba(255,255,255,0.85);margin:2px 0 0;">' + T.readySubtitle + '</p></div>' +
      '<div style="flex-shrink:0;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:#fff;color:' + PALETTE.sage + ';font-size:11px;font-weight:600;">' + share2Svg(PALETTE.sage) + T.shareLabel + '</div></div></div>';
  }

  function render() {
    var T = STRINGS[state.lang];
    var header = state.page === 'catalog' ? renderCatalogHeader(T) : renderChecklistHeader(T);
    var body = state.page === 'catalog'
      ? renderCatalogBody(T)
      : (renderTrustStrip(T) + renderStepsSection(T) + renderDocsSection(T) + renderFooter(T));
    var toast = (state.page === 'checklist' && isDone()) ? renderToast(T) : '';

    document.getElementById('app').innerHTML =
      '<div style="width:100%;max-width:400px;background:' + PALETTE.paper + ';border-radius:24px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">' +
      header + body + '</div>' + toast;
  }

  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.dataset.action;
    if (action === 'set-lang') { state.lang = el.dataset.lang; render(); }
    else if (action === 'open-task') { if (el.dataset.available === 'true') { state.page = 'checklist'; render(); } }
    else if (action === 'go-back') { state.page = 'catalog'; render(); }
    else if (action === 'toggle-doc') { var id = el.dataset.id; state.checked[id] = !state.checked[id]; render(); }
    else if (action === 'toggle-expand') { var id2 = el.dataset.id; state.expandedId = (state.expandedId === id2) ? null : id2; render(); }
  });

  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./service-worker.js').catch(function () {});
    });
  }
</script>
</body>
</html>
